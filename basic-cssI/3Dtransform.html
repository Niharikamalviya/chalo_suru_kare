<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D transform</title>
    <style>
        div {
            height: 100px;
            width: 100px;
            background-color: skyblue;
            border: 1px solid black;
        }

        .translated {
            transform: perspective(10px) translateZ(-2px);
        }

        .scaled {
            transform: perspective(350px) scaleZ(6) rotateX(45deg) rotateY(35deg);
        }
    </style>
</head>

<body>
    <div class="static">static</div>
    <div class="translated">translated</div>
    <div class="scaled">scaled</div>
</body>

</html>
